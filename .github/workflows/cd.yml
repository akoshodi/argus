name: CD

# Promotion flow:
#   feature/* в”Ђв”ЂPRв”Ђв”Ђв–є main в”Ђв”Ђautoв”Ђв”Ђв–є staging env
#   hotfix/*  в”Ђв”ЂPRв”Ђв”Ђв–є prod в”Ђв”Ђapprovalв”Ђв”Ђв–є production env
#                в””в”Ђв”Ђauto backport PRв”Ђв”Ђв–є main
on:
  push:
    branches:
      - main
      - prod

# Each environment gets its own concurrency group so a staging deploy never
# blocks a production deploy and vice versa.
concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # в”Ђв”Ђ Staging в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Runs automatically on every push to main. Uses secrets scoped to the
  # "staging" GitHub environment.
  deploy-staging:
    name: Deploy to staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Capture timing baseline
        id: ts
        run: |
          echo "trigger_ts=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "commit_ts=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin ${{ github.ref_name }}
            terraform -chdir=terraform init -input=false -upgrade
            terraform -chdir=terraform apply -auto-approve \
              -var="project_root=$(pwd)"

      - name: Capture deploy-complete timestamp
        id: deploy_ts
        run: echo "deploy_complete_ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Verify Grafana health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            timeout 60 bash -c \
              'until curl -sf http://localhost:3000/api/health; do sleep 5; done'

      - name: Record LTC sub-interval metrics
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            now=$(date +%s)
            commit_ts="${{ steps.ts.outputs.commit_ts }}"
            trigger_ts="${{ steps.ts.outputs.trigger_ts }}"
            deploy_complete_ts="${{ steps.deploy_ts.outputs.deploy_complete_ts }}"
            commit_to_trigger=$(( trigger_ts - commit_ts ))
            trigger_to_complete=$(( deploy_complete_ts - trigger_ts ))
            complete_to_confirmed=$(( now - deploy_complete_ts ))
            ./scripts/record_ltc.sh \
              "${commit_to_trigger}" \
              "${trigger_to_complete}" \
              "${complete_to_confirmed}"

  # в”Ђв”Ђ Production в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Runs on push to the prod branch. The "production" GitHub environment must
  # have required reviewers configured вЂ” that is the manual approval gate.
  # Secrets are scoped to "production", completely isolated from staging.
  deploy-production:
    name: Deploy to production
    if: github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write  # required to push release tags

    steps:
      - uses: actions/checkout@v4

      - name: Capture timing baseline
        id: ts
        run: |
          echo "trigger_ts=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "commit_ts=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin ${{ github.ref_name }}
            terraform -chdir=terraform init -input=false -upgrade
            terraform -chdir=terraform apply -auto-approve \
              -var="project_root=$(pwd)"

      - name: Capture deploy-complete timestamp
        id: deploy_ts
        run: echo "deploy_complete_ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Verify Grafana health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            timeout 60 bash -c \
              'until curl -sf http://localhost:3000/api/health; do sleep 5; done'

      - name: Record LTC sub-interval metrics
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            now=$(date +%s)
            commit_ts="${{ steps.ts.outputs.commit_ts }}"
            trigger_ts="${{ steps.ts.outputs.trigger_ts }}"
            deploy_complete_ts="${{ steps.deploy_ts.outputs.deploy_complete_ts }}"
            commit_to_trigger=$(( trigger_ts - commit_ts ))
            trigger_to_complete=$(( deploy_complete_ts - trigger_ts ))
            complete_to_confirmed=$(( now - deploy_complete_ts ))
            ./scripts/record_ltc.sh \
              "${commit_to_trigger}" \
              "${trigger_to_complete}" \
              "${complete_to_confirmed}"

      # Tag every successful production deploy for rollback traceability (Rule 8).
      # Format: release/YYYY-MM-DD-<short-sha>
      - name: Tag release
        if: success()
        run: |
          TAG="release/$(date -u +%Y-%m-%d)-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Production release ${{ github.sha }}"
          git push origin "${TAG}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
