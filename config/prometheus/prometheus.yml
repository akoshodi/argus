global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: observabilityhng

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node_exporter
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://sample-app:8080/healthz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox_ssl
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://github.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: github_actions_exporter
    static_configs:
      - targets: ["github-actions-exporter:9171"]

  - job_name: sample_app
    static_configs:
      - targets: ["sample-app:8080"]
